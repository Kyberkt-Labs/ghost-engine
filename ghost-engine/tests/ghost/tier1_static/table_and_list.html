<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ghost T1: Table &amp; List</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 2rem; }
    th, td { border: 1px solid #ccc; padding: 0.5rem; text-align: left; }
    th { background: #f5f5f5; }
  </style>
</head>
<body>
  <h1>Data Table</h1>
  <table id="data-table">
    <thead>
      <tr><th>ID</th><th>Name</th><th>Role</th></tr>
    </thead>
    <tbody>
      <tr><td>1</td><td>Alice</td><td>Engineer</td></tr>
      <tr><td>2</td><td>Bob</td><td>Designer</td></tr>
      <tr><td>3</td><td>Carol</td><td>PM</td></tr>
    </tbody>
  </table>

  <h2>Unordered List</h2>
  <ul id="features">
    <li>Headless rendering</li>
    <li>DOM traversal</li>
    <li>Layout extraction</li>
    <li>AI-agent interaction</li>
  </ul>

  <h2>Ordered List</h2>
  <ol id="steps">
    <li>Load page</li>
    <li>Extract layout</li>
    <li>Serialize tree</li>
    <li>Send to LLM</li>
  </ol>
</body>
</html>
