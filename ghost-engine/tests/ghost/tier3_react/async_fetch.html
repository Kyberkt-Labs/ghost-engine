<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ghost T3: React Async Fetch</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin: 0.5rem 0; }
    .loading { color: #999; font-style: italic; }
  </style>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
</head>
<body>
  <div id="root"></div>
  <script>
    var e = React.createElement;

    // Simulate a fetch() that resolves after a short delay.
    function fakeFetch() {
      return new Promise(function (resolve) {
        setTimeout(function () {
          resolve([
            { id: 1, name: "Ghost Core", desc: "Embedding layer for Servo" },
            { id: 2, name: "Ghost CLI", desc: "Command-line interface" },
            { id: 3, name: "Ghost Interceptor", desc: "Layout pipeline hooks" }
          ]);
        }, 150);
      });
    }

    function DataLoader() {
      var dataState = React.useState(null);
      var data = dataState[0];
      var setData = dataState[1];

      var errState = React.useState(null);
      var error = errState[0];
      var setError = errState[1];

      React.useEffect(function () {
        fakeFetch()
          .then(function (result) {
            setData(result);
            document.title = "Ghost T3: Fetch Loaded (" + result.length + ")";

            var meta = document.createElement("meta");
            meta.name = "ghost-status";
            meta.content = "ready";
            document.head.appendChild(meta);
          })
          .catch(function (err) {
            setError(String(err));
          });
      }, []);

      if (error) {
        return e("p", { className: "error" }, "Error: " + error);
      }

      if (!data) {
        return e("p", { id: "loading-msg", className: "loading" }, "Loading data…");
      }

      return e("div", null,
        e("h1", null, "Ghost Engine Components"),
        e("p", { id: "count" }, data.length + " components loaded"),
        data.map(function (item) {
          return e("div", { key: item.id, className: "card", "data-id": item.id },
            e("h2", null, item.name),
            e("p", null, item.desc)
          );
        })
      );
    }

    var root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(e(DataLoader));
  </script>
</body>
</html>
