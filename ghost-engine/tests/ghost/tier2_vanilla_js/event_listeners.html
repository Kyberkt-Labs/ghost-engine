<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ghost T2: Event Listeners</title>
  <style>
    .btn { padding: 0.5rem 1rem; margin: 0.25rem; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Event Listener Test</h1>
  <button id="btn-click" class="btn">Click Me</button>
  <input  id="input-text" type="text" placeholder="Type here">
  <p id="click-count">clicks:0</p>
  <p id="input-value">input:</p>
  <p id="status">loading</p>

  <script>
    // Sets up event listeners for Phase 3 interaction testing.
    var clicks = 0;

    document.getElementById("btn-click").addEventListener("click", function () {
      clicks++;
      document.getElementById("click-count").textContent = "clicks:" + clicks;
    });

    document.getElementById("input-text").addEventListener("input", function (e) {
      document.getElementById("input-value").textContent = "input:" + e.target.value;
    });

    // Mark ready — event listeners are wired but not yet triggered.
    document.getElementById("status").textContent = "ready";
    document.title = "Ghost T2: Events Ready";
  </script>
</body>
</html>
