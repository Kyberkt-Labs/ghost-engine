[package]
name = "ghost-interact"
version = "0.1.0"
edition = "2024"
publish = false
description = "Agent interaction commands for Ghost Engine — click, type, scroll, navigate, and form manipulation via JS injection"

[lib]
path = "src/lib.rs"

[features]
default = ["headless-shell", "js-jit"]
headless-shell = ["ghost-core/headless-shell"]
js-jit = ["ghost-core/js-jit"]

[dependencies]
ghost-core = { path = "../ghost-core" }
ghost-interceptor = { path = "../ghost-interceptor" }
ghost-serializer = { path = "../ghost-serializer" }
